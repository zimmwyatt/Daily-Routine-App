<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Daily Routine Tracker</title>
  <meta name="theme-color" content="#f2efe8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Routine">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="A simple daily routine tracker you can save to your phone.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow" id="todayLabel">Today</p>
        <h1>DAILY ROUTINE</h1>
      </div>
      <div class="progress-card" aria-live="polite">
        <div class="progress-head">
          <div>
            <p class="progress-label">Today's Score</p>
            <strong id="progressText">0 of 0 tasks complete</strong>
          </div>
          <span id="progressPercent" class="progress-percent">0%</span>
        </div>
        <div class="progress-bar" aria-hidden="true">
          <span id="progressFill" class="progress-fill"></span>
        </div>
      </div>
    </header>

    <section class="card controls">
      <form id="taskForm" class="task-form">
        <label>
          <span>Task</span>
          <input id="taskName" name="taskName" type="text" maxlength="60" placeholder="Drink water" required>
        </label>
        <label>
          <span>Time</span>
          <input id="taskTime" name="taskTime" type="time">
        </label>
        <button type="submit">Add Routine Item</button>
      </form>
    </section>

    <section class="routine-section">
      <div class="section-heading">
        <h2>Today's Checklist</h2>
        <p id="sectionMeta">Tap a circle to mark something done.</p>
      </div>
      <ul id="taskList" class="task-list" aria-live="polite"></ul>
    </section>
  </main>

  <template id="taskTemplate">
    <li class="task-item">
      <div class="task-row-shell">
        <div class="task-main">
          <button class="toggle" type="button" aria-label="Mark task complete"></button>
          <span class="task-time"></span>
          <div class="task-copy">
            <strong class="task-name"></strong>
          </div>
          <div class="task-actions">
            <button class="icon-button edit-task-button" type="button" aria-label="Edit task" title="Edit task">✏️</button>
            <button class="icon-button note-button" type="button" aria-label="Open notes" title="Notes">ℹ️</button>
            <button class="icon-button delete-button" type="button" aria-label="Delete task" title="Delete task">🗑️</button>
          </div>
        </div>
      </div>

      <div class="panel-stack">
        <div class="task-panel note-panel">
          <div class="panel-inner">
            <div class="note-view">
              <div class="panel-header">
                <span class="panel-label">Note</span>
                <button class="icon-button edit-note-button" type="button" aria-label="Edit note" title="Edit note">✏️</button>
              </div>
              <p class="note-content">No note added</p>
            </div>
            <div class="note-edit" hidden>
              <label class="field-block">
                <span class="panel-label">Edit Note</span>
                <textarea class="note-input" rows="4" placeholder="Add a note or description for this task..."></textarea>
              </label>
              <div class="panel-actions">
                <button class="save-note-button" type="button">Save Note</button>
              </div>
            </div>
          </div>
        </div>

        <div class="task-panel edit-panel">
          <div class="panel-inner">
            <div class="edit-form">
              <label class="field-block">
                <span class="panel-label">Task Name</span>
                <input class="edit-task-name" type="text" maxlength="60" placeholder="Task name">
              </label>
              <label class="field-block">
                <span class="panel-label">Time</span>
                <input class="edit-task-time" type="time">
              </label>
            </div>
            <div class="panel-actions">
              <button class="save-task-button" type="button">Save Changes</button>
            </div>
          </div>
        </div>
      </div>
    </li>
  </template>

  <script src="script.js"></script>
</body>
</html>
