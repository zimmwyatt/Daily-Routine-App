<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Daily Routine Tracker</title>
  <meta name="theme-color" content="#f2efe8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Routine">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="A simple daily routine tracker you can save to your phone.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow" id="todayLabel">Today</p>
        <h1>DAILY ROUTINE</h1>
      </div>
      <div class="progress-card" aria-live="polite">
        <div class="progress-head">
          <div>
            <p class="progress-label">Today's Score</p>
            <strong id="progressText">0 of 0 tasks complete</strong>
          </div>
          <span id="progressPercent" class="progress-percent">0%</span>
        </div>
        <div class="progress-bar" aria-hidden="true">
          <span id="progressFill" class="progress-fill"></span>
        </div>
      </div>
    </header>

    <section class="card controls">
      <form id="taskForm" class="task-form">
        <label>
          <span>Task</span>
          <input id="taskName" name="taskName" type="text" maxlength="60" placeholder="Drink water" required>
        </label>
        <label>
          <span>Time</span>
          <input id="taskTime" name="taskTime" type="time">
        </label>
        <button type="submit">Add Routine Item</button>
      </form>
    </section>

    <section class="routine-section">
      <div class="section-heading">
        <h2>Today's Checklist</h2>
        <p id="sectionMeta">Tap a circle to mark something done.</p>
      </div>
      <ul id="taskList" class="task-list" aria-live="polite"></ul>
    </section>
  </main>

  <template id="taskTemplate">
    <li class="task-item">
      <div class="task-main">
        <button class="toggle" type="button" aria-label="Mark task complete"></button>
        <div class="task-copy">
          <div class="task-topline">
            <strong class="task-name"></strong>
            <span class="task-time"></span>
          </div>
          <div class="task-meta">
            <span class="status-pill">Pending</span>
          </div>
        </div>
        <div class="task-actions">
          <button class="note-button" type="button" aria-label="Add note">Add Note</button>
          <button class="delete-button" type="button" aria-label="Delete task">Delete</button>
        </div>
      </div>
      <div class="note-panel"></div>
    </li>
  </template>

  <script src="script.js"></script>
</body>
</html>
